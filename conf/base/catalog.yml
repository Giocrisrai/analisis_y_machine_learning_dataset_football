# Here you can define all your datasets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/catalog-data/introduction/#data-catalog

# Base de datos SQLite en capa raw (data/raw/database.sqlite).
# La URL es relativa al directorio raíz del proyecto al ejecutar `kedro run` / notebooks.
_sqlite: &sqlite
  con: sqlite:///data/raw/database.sqlite

country:
  type: pandas.SQLTableDataset
  table_name: Country
  credentials: *sqlite

league:
  type: pandas.SQLTableDataset
  table_name: League
  credentials: *sqlite

match:
  type: pandas.SQLTableDataset
  table_name: Match
  credentials: *sqlite

player:
  type: pandas.SQLTableDataset
  table_name: Player
  credentials: *sqlite

player_attributes:
  type: pandas.SQLTableDataset
  table_name: Player_Attributes
  credentials: *sqlite

team:
  type: pandas.SQLTableDataset
  table_name: Team
  credentials: *sqlite

team_attributes:
  type: pandas.SQLTableDataset
  table_name: Team_Attributes
  credentials: *sqlite

# Salida de data_processing: mismas filas que en el notebook (cuotas + outcome + goles).
features_for_ml:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/features_for_ml.parquet

classification_metrics:
  type: json.JSONDataset
  filepath: data/08_reporting/classification_metrics.json

classification_model:
  type: pickle.PickleDataset
  filepath: data/06_models/classification_best_model.pkl

classification_feature_importance:
  type: pandas.CSVDataset
  filepath: data/08_reporting/classification_permutation_importance.csv

regression_metrics:
  type: json.JSONDataset
  filepath: data/08_reporting/regression_metrics.json

regression_model:
  type: pickle.PickleDataset
  filepath: data/06_models/regression_best_model.pkl

regression_feature_importance:
  type: pandas.CSVDataset
  filepath: data/08_reporting/regression_permutation_importance.csv
